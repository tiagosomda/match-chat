<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Match Chat — spoiler-free World Cup forum">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Match Chat">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- Theme color matches the app background and adapts to the system theme -->
  <meta name="theme-color" content="#06140D" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#E7F1E8" media="(prefers-color-scheme: light)">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <style>
    /* Paint the safe-area / overscroll regions with the app background so the
       installed (add-to-home-screen) app doesn't flash white bands above and
       below the Flutter canvas. Mirrors AppColors.dark/light. */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #06140D;
      overscroll-behavior: none;
    }
    @media (prefers-color-scheme: light) {
      html, body { background-color: #E7F1E8; }
    }
  </style>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <title>Match Chat</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
